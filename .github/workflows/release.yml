name: Release

on:
  push:
    tags:
      - 'v*'

# Builds signed macOS binaries (arm64 + x86_64), creates a GitHub Release,
# and publishes latest.json for the in-app auto-updater.
#
# Required GitHub Secrets:
#   TAURI_SIGNING_PRIVATE_KEY        — from `npx tauri signer generate`
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — empty string if key has no password
#
# Future secrets (GL-3 / GL-4 — after Apple Developer account):
#   APPLE_CERTIFICATE               — base64-encoded .p12
#   APPLE_CERTIFICATE_PASSWORD      — .p12 password
#   APPLE_SIGNING_IDENTITY          — e.g. "Developer ID Application: ..."
#   APPLE_ID                        — Apple ID email
#   APPLE_PASSWORD                  — app-specific password
#   APPLE_TEAM_ID                   — 10-char team ID

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-apple-darwin
            runner: macos-latest

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install JS dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple signing — uncomment after GL-3 is complete
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'AlphaPi ${{ github.ref_name }}'
          releaseBody: |
            **This is a private beta build for invited testers.**

            ---

            ## Download

            Click **Assets** below to expand the download list, then pick the right file for your Mac:

            | Your Mac | File to download |
            |----------|-----------------|
            | M1, M2, M3, M4 (any MacBook/iMac/Mac Mini from late 2020 onward) | `AlphaPi_0.9.1_aarch64.dmg` |
            | Intel (older Mac, pre-2020) | `AlphaPi_0.9.1_x64.dmg` |

            Not sure which you have? Click **Apple menu → About This Mac**. If it says "Apple M..." you have an M-series Mac. If it says "Intel Core" you have an Intel Mac.

            ---

            ## Installation

            1. Double-click the `.dmg` to open it
            2. Drag **AlphaPi.app** into the **Applications** folder shortcut
            3. Eject the disk image
            4. Open **Terminal** and paste this command — it removes the macOS security restriction and launches the app:
            ```
            xattr -cr /Applications/AlphaPi.app && open /Applications/AlphaPi.app
            ```

            For full testing instructions, see [TESTER-GUIDE.md](https://github.com/baltaguilar-tech/ai-governance-tool/blob/main/TESTER-GUIDE.md).

            ---

            **What's in this build**
            - Complete 6-dimension AI governance assessment (up to 63 questions per profile)
            - Free and Professional tiers (use Testing Mode in Settings to switch)
            - Full PDF export with per-question action items (Pro)
            - Track Progress & ROI dashboard with charts and PDF export (Pro)
            - ROI Model Builder — 6-step financial model with 3-scenario results (Pro)
            - AI-generated Executive Summary via your Anthropic API key (Pro)
            - Industry-specific regulatory guidance for Energy & Utilities
            - Settings: License, Email, Notifications, Updates, My Data

            **Known limitations in this beta**
            - App is unsigned (macOS Gatekeeper will warn on first open — the Terminal command above handles this automatically)
            - License purchase not yet available — use `BETA-TESTER-2026` to access Pro
            - DOCX export coming in a future release
          releaseDraft: false
          prerelease: true
          args: --target ${{ matrix.target }}
          updaterJsonPreferNsis: false
          updaterJsonKeepUniversal: false
