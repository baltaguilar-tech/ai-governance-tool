<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Governance Assessment</title>
  <style>
    @keyframes ai-spin { to { transform: rotate(360deg); } }
    @keyframes ai-pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
  </style>
  </head>
  <body>
    <div id="root">
      <div style="background:radial-gradient(ellipse at 50% 25%,rgba(43,92,255,0.18) 0%,transparent 60%),#02093A;height:100vh;width:100vw;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;">
        <div style="width:48px;height:48px;border-radius:12px;background:rgba(43,92,255,0.12);border:1px solid rgba(43,92,255,0.35);display:flex;align-items:center;justify-content:center;margin-bottom:20px;box-shadow:0 0 24px rgba(43,92,255,0.2);">
          <div style="width:20px;height:20px;border:2px solid rgba(43,92,255,0.3);border-top-color:#2B5CFF;border-radius:50%;animation:ai-spin 0.9s linear infinite;"></div>
        </div>
        <p style="color:#FFFFFF;font-size:20px;font-weight:700;margin:0;letter-spacing:-0.4px;">AI Governance and ROI Assessment</p>
        <p style="color:rgba(255,255,255,0.4);font-size:12px;font-style:italic;margin:8px 0 0 0;">Know your AI risk. Before it knows you.</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
